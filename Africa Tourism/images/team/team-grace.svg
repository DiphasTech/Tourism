  <!-- Name -->
  <text x="300" y="580" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="400" fill="#FAF7F0">Grace Namukasa</text>
  <!-- Role -->
  <text x="300" y="616" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#C8963E" letter-spacing="2">OPERATIONS DIRECTOR</text>
  <!-- Decorative lines -->
