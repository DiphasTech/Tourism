<svg xmlns="http://www.w3.org/2000/svg" width="600" height="700" viewBox="0 0 600 700">
  <defs>
    <linearGradient id="bgGN" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2E1A"/>
      <stop offset="100%" style="stop-color:#2C4A3E"/>
    </linearGradient>
    <radialGradient id="faceGN" cx="50%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#C8963E;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#1A2E1A;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="700" fill="url(#bgGN)"/>
  <rect width="600" height="700" fill="url(#faceGN)"/>
  <!-- Person silhouette -->
  <circle cx="300" cy="240" r="90" fill="#C8963E" opacity="0.22"/>
  <circle cx="300" cy="240" r="70" fill="#C8963E" opacity="0.35"/>
